<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot & Tasty — Меню исправлено</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand-yellow: #ffca28; --brand-red: #e63946; --dark: #1d3557; --bg: #f8f9fa; }
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; margin: 0; background-color: var(--bg); scroll-behavior: smooth; }
        
        header { 
            background: var(--dark); color: white; padding: 0 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1100; height: 70px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .logo { font-family: 'Oswald', sans-serif; font-size: 1.8rem; color: var(--brand-yellow); }
        .cart-toggle { background: var(--brand-yellow); color: var(--dark); padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; border: none; }

        .category-nav { 
            background: white; padding: 12px 0; text-align: center; 
            position: sticky; top: 70px; z-index: 1000; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }
        .nav-btn { background: none; border: 2px solid var(--dark); padding: 6px 15px; margin: 3px; border-radius: 20px; cursor: pointer; font-weight: bold; font-family: 'Oswald'; transition: 0.3s; }
        .nav-btn:hover { background: var(--dark); color: white; }

        .container { padding: 10px 5% 50px 5%; }
        .section-title { 
            scroll-margin-top: 150px; text-align: center; font-family: 'Oswald', sans-serif; 
            font-size: 2.2rem; margin: 50px 0 30px; color: var(--dark); text-transform: uppercase; 
            border-bottom: 4px solid var(--brand-yellow); display: inline-block; width: 100%; 
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; min-height: 100px; }
        .item-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .item-card img { width: 100%; height: 200px; object-fit: cover; background: #ddd; }
        .item-content { padding: 20px; flex-grow: 1; text-align: center; }
        
        .weight-selector { display: flex; justify-content: center; gap: 5px; margin: 15px 0; }
        .weight-btn { padding: 5px 10px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; font-size: 0.8rem; background: white; }
        .weight-btn.active { background: var(--brand-yellow); border-color: var(--brand-yellow); font-weight: bold; }

        .price-tag { font-size: 1.5rem; font-weight: bold; color: var(--brand-red); margin-bottom: 15px; }
        .btn-add { background: var(--brand-red); color: white; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 100%; }

        .cart-panel { position: fixed; right: -400px; top: 0; width: 350px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 2000; transition: 0.4s; padding: 20px; display: flex; flex-direction: column; }
        .cart-panel.open { right: 0; }
        .cart-items { flex-grow: 1; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        
        #checkoutModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Presto Pizza</div>
        <button class="cart-toggle" onclick="toggleCart()">🛒 Корзина (<span id="cart-count">0</span>)</button>
    </header>

    <div class="category-nav">
        <button class="nav-btn" onclick="scrollToSection('pizza-sec')">Пицца</button>
        <button class="nav-btn" onclick="scrollToSection('pie-sec')">Пироги</button>
        <button class="nav-btn" onclick="scrollToSection('burger-sec')">Бургеры</button>
        <button class="nav-btn" onclick="scrollToSection('drink-sec')">Напитки</button>
    </div>

    <div class="cart-panel" id="cartPanel">
        <h2>Ваш заказ</h2>
        <div class="cart-items" id="cartItems"></div>
        <div style="text-align:center; padding:15px; font-weight:bold; font-size:1.4rem;">Итого: <span id="totalPrice">0</span> ₽</div>
        <button class="btn-add" style="background:var(--dark);" onclick="openCheckoutModal()">Оформить</button>
        <button onclick="toggleCart()" style="background:none; border:none; color:gray; cursor:pointer; margin-top:10px; width:100%;">Закрыть</button>
    </div>

    <div id="checkoutModal">
        <div class="modal-content">
            <h3 style="text-align:center;">Данные доставки</h3>
            <form action="https://formspree.io/f/mwvrlgoj" method="POST" style="display:flex; flex-direction:column; gap:10px;">
                <input type="text" name="name" placeholder="Ваше имя" required style="padding:10px; border-radius:8px; border:1px solid #ddd;">
                <input type="tel" name="phone" placeholder="Телефон" required style="padding:10px; border-radius:8px; border:1px solid #ddd;">
                <input type="text" name="address" placeholder="Адрес доставки" required style="padding:10px; border-radius:8px; border:1px solid #ddd;">
                <input type="hidden" name="order_details" id="hiddenDetails">
                <div id="orderSum" style="background:#f1f1f1; padding:10px; border-radius:8px;"></div>
                <button type="submit" class="btn-add">Заказать</button>
                <button type="button" onclick="closeModal()" style="background:none; border:none; color:gray; cursor:pointer;">Отмена</button>
            </form>
        </div>
    </div>

    <div class="container">
        <h2 id="pizza-sec" class="section-title">🍕 Пицца</h2>
        <div class="grid" id="pizza-menu"></div>

        <h2 id="pie-sec" class="section-title">🥧 Осетинские пироги</h2>
        <div class="grid" id="pie-menu"></div>

        <h2 id="burger-sec" class="section-title">🍔 Бургеры</h2>
        <div class="grid" id="burger-menu"></div>

        <h2 id="drink-sec" class="section-title">🥤 Напитки</h2>
        <div class="grid" id="drink-menu"></div>
    </div>

    <script>
        // ДАННЫЕ
        const pizzas = [
            { name: "Маргарита", img: "https://images.unsplash.com/photo-1604068549290-dea0e4a305ca?w=400", p350: 450, p600: 650, p900: 850 },
            { name: "Пепперони", img: "https://images.unsplash.com/photo-1628840042765-356cda07504e?w=400", p350: 550, p600: 750, p900: 950 },
            { name: "Четыре сыра", img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400", p350: 600, p600: 800, p900: 1000 },
            { name: "Мясной пир", img: "https://images.unsplash.com/photo-1541745537411-b8046dc6d66c?w=400", p350: 650, p600: 850, p900: 1100 },
            { name: "Грибная", img: "https://images.unsplash.com/photo-1571407970349-bc81e7e96d47?w=400", p350: 490, p600: 690, p900: 890 },
            { name: "Барбекю", img: "https://images.unsplash.com/photo-1594007654729-407eedc4be65?w=400", p350: 590, p600: 790, p900: 990 }
        ];

        const pies = [
            { name: "Мясной (Фыдджин)", img: "https://images.unsplash.com/photo-1595131838595-3154b9f4450b?w=400", p350: 550, p600: 750, p900: 950 },
            { name: "Сырный (Улибах)", img: "https://images.unsplash.com/photo-1621841957884-1210fe19d66d?w=400", p350: 450, p600: 650, p900: 850 },
            { name: "Картофель/Сыр", img: "https://images.unsplash.com/photo-1619860460498-844c802e3f53?w=400", p350: 450, p600: 650, p900: 850 },
            { name: "Свекла/Сыр", img: "https://images.unsplash.com/photo-1512149177596-f817c7ef5d4c?w=400", p350: 480, p600: 680, p900: 880 },
            { name: "С тыквой", img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=400", p350: 430, p600: 630, p900: 830 }
        ];

        const burgers = [
            { name: "Классик", img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400", price: 380 },
            { name: "Блэк Бургер", img: "https://images.unsplash.com/photo-1586190848861-99aa4a171e90?w=400", price: 450 },
            { name: "Чикен Бургер", img: "https://images.unsplash.com/photo-1514327605112-b887c0e61c0a?w=400", price: 360 },
            { name: "Двойной", img: "https://images.unsplash.com/photo-1550547660-d9450f859349?w=400", price: 590 }
        ];

        const drinks = [
            { name: "Кола 0.5л", img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400", price: 120 },
            { name: "Сок 1л", img: "https://images.unsplash.com/photo-1613478223719-2ab802602423?w=400", price: 180 },
            { name: "Вода 0.5л", img: "https://images.unsplash.com/photo-1559839914-17aae19cea9e?w=400", price: 90 },
            { name: "Морс 0.5л", img: "https://images.unsplash.com/photo-1551024709-8f23befc6f87?w=400", price: 150 },
            { name: "Чай 0.5л", img: "https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=400", price: 130 }
        ];

        let cart = [];

        // ФУНКЦИИ
        window.onload = function() {
            renderMenu();
        };

        function renderMenu() {
            const pizzaGrid = document.getElementById('pizza-menu');
            const pieGrid = document.getElementById('pie-menu');
            const burgerGrid = document.getElementById('burger-menu');
            const drinkGrid = document.getElementById('drink-menu');

            // Отрисовка с весом (Пицца/Пироги)
            const drawW = (data, grid) => {
                data.forEach(item => {
                    grid.innerHTML += `
                    <div class="item-card">
                        <img src="${item.img}">
                        <div class="item-content">
                            <h3>${item.name}</h3>
                            <div class="weight-selector">
                                <button class="weight-btn active" onclick="setW(this, ${item.p350})">350г</button>
                                <button class="weight-btn" onclick="setW(this, ${item.p600})">600г</button>
                                <button class="weight-btn" onclick="setW(this, ${item.p900})">900г</button>
                            </div>
                            <div class="price-tag">${item.p350} ₽</div>
                            <button class="btn-add" onclick="addWeighted('${item.name}', this)">В корзину</button>
                        </div>
                    </div>`;
                });
            };

            // Отрисовка простых (Бургеры/Напитки)
            const drawS = (data, grid) => {
                data.forEach(item => {
                    grid.innerHTML += `
                    <div class="item-card">
                        <img src="${item.img}">
                        <div class="item-content">
                            <h3>${item.name}</h3>
                            <div class="price-tag">${item.price} ₽</div>
                            <button class="btn-add" onclick="addSimple('${item.name}', ${item.price})">В корзину</button>
                        </div>
                    </div>`;
                });
            };

            drawW(pizzas, pizzaGrid);
            drawW(pies, pieGrid);
            drawS(burgers, burgerGrid);
            drawS(drinks, drinkGrid);
        }

        function setW(btn, price) {
            const card = btn.closest('.item-card');
            card.querySelectorAll('.weight-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            card.querySelector('.price-tag').innerText = price + " ₽";
        }

        function addWeighted(name, btn) {
            const card = btn.closest('.item-card');
            const w = card.querySelector('.weight-btn.active').innerText;
            const p = parseInt(card.querySelector('.price-tag').innerText);
            cart.push({ name: `${name} (${w})`, price: p });
            updateCart();
        }

        function addSimple(name, p) {
            cart.push({ name: name, price: p });
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cartItems');
            document.getElementById('cart-count').innerText = cart.length;
            let total = 0;
            list.innerHTML = cart.map((item, i) => {
                total += item.price;
                return `<div class="cart-item"><span>${item.name}</span><span>${item.price} ₽ <button onclick="remove(${i})" style="color:red;border:none;background:none;cursor:pointer;">✕</button></span></div>`;
            }).join('');
            document.getElementById('totalPrice').innerText = total;
        }

        function remove(i) { cart.splice(i, 1); updateCart(); }
        function toggleCart() { document.getElementById('cartPanel').classList.toggle('open'); }
        function closeModal() { document.getElementById('checkoutModal').style.display = 'none'; }
        function scrollToSection(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }

        function openCheckoutModal() {
            if(cart.length === 0) return alert("Корзина пуста");
            const total = document.getElementById('totalPrice').innerText;
            document.getElementById('orderSum').innerHTML = `К оплате: <strong>${total} ₽</strong>`;
            document.getElementById('hiddenDetails').value = cart.map(i => i.name).join(', ') + " | Итого: " + total + "р";
            document.getElementById('checkoutModal').style.display = 'flex';
        }
    </script>
</body>
</html>
